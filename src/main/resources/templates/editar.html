<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Editar Tarefa</title>
</head>
<body class="container mt-5">
<h1>Editar Tarefa</h1>

<form th:action="@{/atualizar}" method="post">
    <input type="hidden" name="id" th:value="${todo.id}">

    <div class="mb-3">
        <label>Título:</label>
        <input type="text" name="titulo" th:value="${todo.titulo}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Descrição:</label>
        <input type="text" name="descricao" th:value="${todo.descricao}" class="form-control">
    </div>

    <button class="btn btn-warning">Salvar</button>
    <a th:href="@{/}" class="btn btn-secondary">Cancelar</a>
</form>
</body>
</html>
