<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>To-Do List</title>
</head>
<body class="container mt-5">
<h1>🗒️ To-Do List</h1>

<form th:action="@{/add}" method="post" class="mb-4">
    <div class="input-group">
        <input type="text" name="titulo" class="form-control" placeholder="Nova tarefa..." required>
        <button class="btn btn-success">➕ Adicionar</button>
    </div>
</form>

<div th:if="${todos.isEmpty()}" class="alert alert-info">
    Nenhuma tarefa! Crie a primeira ➕
</div>

<ul class="list-group" th:unless="${todos.isEmpty()}">
    <li th:each="todo : ${todos}" class="list-group-item d-flex justify-content-between">
        <span th:text="${todo.titulo}"></span>
        <div>
            <a th:href="@{/editar(id=${todo.id})}" class="btn btn-sm btn-warning">️Editar</a>
            <a th:href="@{/deletar(id=${todo.id})}" class="btn btn-sm btn-danger">Apagar️</a>
        </div>
    </li>
</ul>
</body>
</html>
